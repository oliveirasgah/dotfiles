# Panes
map alt+n               launch --location=split --cwd=current
map alt+d               launch --location=hsplit --cwd=current
map alt+e               launch --location=vsplit --cwd=current
map alt+x               close_window

map ctrl+alt+h          neighboring_window left
map ctrl+alt+j          neighboring_window down
map ctrl+alt+k          neighboring_window up
map ctrl+alt+l          neighboring_window right
map alt+left            neighboring_window left
map alt+down            neighboring_window down
map alt+up              neighboring_window up
map alt+right           neighboring_window right

map ctrl+alt+shift+h    move_window left
map ctrl+alt+shift+j    move_window down
map ctrl+alt+shift+k    move_window up
map ctrl+alt+shift+l    move_window right
map alt+bracketleft     move_window backward
map alt+bracketright    move_window forward

map alt+r               start_resizing_window

# Tabs
map alt+t               new_tab_with_cwd
map alt+w               close_tab
map alt+i               move_tab_backward
map alt+o               move_tab_forward
map alt+comma           set_tab_title

map alt+1               goto_tab 1
map alt+2               goto_tab 2
map alt+3               goto_tab 3
map alt+4               goto_tab 4
map alt+5               goto_tab 5
map alt+6               goto_tab 6
map alt+7               goto_tab 7
map alt+8               goto_tab 8
map alt+9               goto_tab 9

map alt+tab             next_tab
map alt+shift+tab       previous_tab

# Misc
map alt+s               show_scrollback
map alt+q               close_os_window
